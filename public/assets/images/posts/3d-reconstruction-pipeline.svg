<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">A 3D reconstruction pipeline</title>
  <desc id="desc">Overlapping camera images are matched, projected into a point cloud, and converted into a textured mesh.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#091526"/>
      <stop offset="1" stop-color="#172a46"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f3b5b"/>
      <stop offset="1" stop-color="#132a44"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0l10 5-10 5z" fill="#73d7ff"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#020812" flood-opacity=".45"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1030" cy="90" r="180" fill="#2078aa" opacity=".12"/>
  <circle cx="140" cy="585" r="220" fill="#6457d7" opacity=".1"/>

  <text x="70" y="82" fill="#f2f8ff" font-family="Inter,Arial,sans-serif" font-size="39" font-weight="700">From photographs to a 3D model</text>
  <text x="72" y="119" fill="#a7bed6" font-family="Inter,Arial,sans-serif" font-size="20">Geometry connects multiple 2D observations of the same scene</text>

  <g filter="url(#shadow)">
    <rect x="65" y="178" width="265" height="330" rx="24" fill="url(#card)" stroke="#315778"/>
    <rect x="462" y="178" width="276" height="330" rx="24" fill="url(#card)" stroke="#315778"/>
    <rect x="870" y="178" width="265" height="330" rx="24" fill="url(#card)" stroke="#315778"/>
  </g>

  <text x="197" y="474" text-anchor="middle" fill="#eaf6ff" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="600">Overlapping images</text>
  <text x="600" y="474" text-anchor="middle" fill="#eaf6ff" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="600">Cameras + point cloud</text>
  <text x="1002" y="474" text-anchor="middle" fill="#eaf6ff" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="600">Surface + texture</text>

  <path d="M350 337h82" stroke="#73d7ff" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M758 337h82" stroke="#73d7ff" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="391" y="317" text-anchor="middle" fill="#9ddff7" font-family="Inter,Arial,sans-serif" font-size="16">match</text>
  <text x="799" y="317" text-anchor="middle" fill="#9ddff7" font-family="Inter,Arial,sans-serif" font-size="16">fuse</text>

  <g transform="translate(91 222)">
    <rect x="0" y="28" width="150" height="118" rx="8" fill="#d7e8f0" transform="rotate(-8 75 87)"/>
    <rect x="38" y="4" width="150" height="118" rx="8" fill="#eff7fb" transform="rotate(8 113 63)"/>
    <path d="M59 98l38-41 27 29 28-17 24 34z" fill="#397b73" transform="rotate(8 113 63)"/>
    <circle cx="151" cy="44" r="13" fill="#f4b95c"/>
    <rect x="72" y="42" width="150" height="118" rx="8" fill="#f8fcff" stroke="#8aabc0"/>
    <path d="M83 144l42-55 27 31 27-43 31 67z" fill="#4d9485"/>
    <circle cx="191" cy="65" r="14" fill="#ffc65d"/>
    <g fill="#ff6f91">
      <circle cx="113" cy="114" r="5"/><circle cx="144" cy="112" r="5"/><circle cx="176" cy="119" r="5"/>
    </g>
  </g>

  <g transform="translate(494 226)">
    <g stroke="#8ddcff" stroke-width="2" fill="none" opacity=".75">
      <path d="M20 32l34 21-34 21zM54 53l105 46"/>
      <path d="M220 24l-36 23 36 23zM184 47l-92 58"/>
      <path d="M45 164l34-21-34-22zM79 143l89-41"/>
    </g>
    <g fill="#f5b85c">
      <circle cx="20" cy="53" r="7"/><circle cx="220" cy="47" r="7"/><circle cx="45" cy="143" r="7"/>
    </g>
    <g fill="#7de0c3">
      <circle cx="111" cy="75" r="4"/><circle cx="128" cy="90" r="4"/><circle cx="95" cy="99" r="4"/>
      <circle cx="143" cy="112" r="4"/><circle cx="119" cy="126" r="4"/><circle cx="160" cy="82" r="4"/>
      <circle cx="82" cy="120" r="4"/><circle cx="147" cy="139" r="4"/><circle cx="173" cy="119" r="4"/>
      <circle cx="104" cy="148" r="4"/><circle cx="69" cy="92" r="4"/><circle cx="183" cy="94" r="4"/>
    </g>
    <g fill="#ff7192">
      <circle cx="119" cy="103" r="4"/><circle cx="137" cy="73" r="4"/><circle cx="154" cy="98" r="4"/>
      <circle cx="90" cy="137" r="4"/><circle cx="129" cy="151" r="4"/>
    </g>
  </g>

  <g transform="translate(911 218)">
    <path d="M22 153L71 54l66-30 82 71-30 80-92 27z" fill="#4d9b89" stroke="#8ee5c5" stroke-width="3"/>
    <path d="M71 54l56 69 10-99M127 123l92-28M127 123l62 52M22 153l105-30M97 202l30-79" fill="none" stroke="#b6f2dc" stroke-width="2" opacity=".8"/>
    <path d="M71 54l-49 99M137 24l52 151M219 95L97 202" fill="none" stroke="#277361" stroke-width="2"/>
    <circle cx="71" cy="54" r="5" fill="#ffd06d"/>
    <circle cx="137" cy="24" r="5" fill="#ffd06d"/>
    <circle cx="219" cy="95" r="5" fill="#ffd06d"/>
    <circle cx="189" cy="175" r="5" fill="#ffd06d"/>
    <circle cx="97" cy="202" r="5" fill="#ffd06d"/>
    <circle cx="22" cy="153" r="5" fill="#ffd06d"/>
    <circle cx="127" cy="123" r="6" fill="#ff7192"/>
  </g>

  <g font-family="Inter,Arial,sans-serif" font-size="16" fill="#96abc1">
    <text x="197" y="545" text-anchor="middle">capture</text>
    <text x="600" y="545" text-anchor="middle">estimate</text>
    <text x="1002" y="545" text-anchor="middle">represent</text>
  </g>
</svg>

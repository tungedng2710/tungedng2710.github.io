<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Q-learning in a grid world</title>
  <desc id="desc">A four by four grid with an agent, obstacle, trap, goal, and a path learned using Q-learning.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e3a5f"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#38bdf8"/>
    </marker>
  </defs>

  <rect width="1200" height="675" fill="url(#background)"/>
  <circle cx="1080" cy="90" r="170" fill="#38bdf8" opacity="0.08"/>
  <circle cx="170" cy="650" r="220" fill="#22c55e" opacity="0.06"/>

  <text x="90" y="120" fill="#f8fafc" font-family="Arial, sans-serif" font-size="58" font-weight="700">Q-Learning</text>
  <text x="92" y="172" fill="#94a3b8" font-family="Arial, sans-serif" font-size="27">Learn a policy through trial and error</text>

  <g transform="translate(90 235)">
    <rect x="0" y="0" width="400" height="252" rx="20" fill="#111827" stroke="#334155" stroke-width="2"/>
    <text x="28" y="50" fill="#e2e8f0" font-family="monospace" font-size="24">Q(s, a) = Q(s, a) +</text>
    <text x="28" y="94" fill="#38bdf8" font-family="monospace" font-size="24">alpha [r + gamma max Q</text>
    <text x="28" y="138" fill="#38bdf8" font-family="monospace" font-size="24">       - Q(s, a)]</text>
    <line x1="28" y1="172" x2="370" y2="172" stroke="#334155" stroke-width="2"/>
    <text x="28" y="215" fill="#94a3b8" font-family="Arial, sans-serif" font-size="21">Explore. Update. Improve.</text>
  </g>

  <g transform="translate(645 92)">
    <rect x="-24" y="-24" width="478" height="478" rx="28" fill="#0b1220" stroke="#334155" stroke-width="3"/>

    <g fill="#172033" stroke="#475569" stroke-width="2">
      <rect x="0" y="0" width="100" height="100"/>
      <rect x="110" y="0" width="100" height="100"/>
      <rect x="220" y="0" width="100" height="100"/>
      <rect x="330" y="0" width="100" height="100"/>
      <rect x="0" y="110" width="100" height="100"/>
      <rect x="110" y="110" width="100" height="100" fill="#475569"/>
      <rect x="220" y="110" width="100" height="100"/>
      <rect x="330" y="110" width="100" height="100"/>
      <rect x="0" y="220" width="100" height="100"/>
      <rect x="110" y="220" width="100" height="100" fill="#7f1d1d"/>
      <rect x="220" y="220" width="100" height="100"/>
      <rect x="330" y="220" width="100" height="100"/>
      <rect x="0" y="330" width="100" height="100"/>
      <rect x="110" y="330" width="100" height="100"/>
      <rect x="220" y="330" width="100" height="100"/>
      <rect x="330" y="330" width="100" height="100" fill="#14532d"/>
    </g>

    <text x="50" y="65" text-anchor="middle" fill="#f8fafc" font-family="Arial, sans-serif" font-size="30" font-weight="700">S</text>
    <text x="160" y="175" text-anchor="middle" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="38" font-weight="700">#</text>
    <text x="160" y="285" text-anchor="middle" fill="#fecaca" font-family="Arial, sans-serif" font-size="32" font-weight="700">X</text>
    <text x="380" y="395" text-anchor="middle" fill="#dcfce7" font-family="Arial, sans-serif" font-size="32" font-weight="700">G</text>

    <path d="M50 78 L50 372 L365 372" fill="none" stroke="#38bdf8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
    <circle cx="50" cy="78" r="10" fill="#f8fafc"/>
  </g>

  <g transform="translate(90 555)" font-family="Arial, sans-serif" font-size="20">
    <circle cx="10" cy="0" r="8" fill="#38bdf8"/>
    <text x="30" y="7" fill="#cbd5e1">learned path</text>
    <rect x="190" y="-10" width="20" height="20" fill="#475569"/>
    <text x="222" y="7" fill="#cbd5e1">wall</text>
    <rect x="300" y="-10" width="20" height="20" fill="#7f1d1d"/>
    <text x="332" y="7" fill="#cbd5e1">trap</text>
    <rect x="410" y="-10" width="20" height="20" fill="#14532d"/>
    <text x="442" y="7" fill="#cbd5e1">goal</text>
  </g>
</svg>
